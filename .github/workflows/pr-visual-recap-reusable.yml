name: PR Visual Recap (reusable)

# Reusable version of pr-visual-recap.yml.  Consumer repos reference this
# workflow via `uses:` instead of copying the full ~360-line YAML.  Fixes and
# improvements land here first and reach every caller automatically.
#
# Usage in a caller workflow (see docs/pr-visual-recap.md for the full snippet):
#
#   jobs:
#     visual-recap:
#       uses: BuilderIO/agent-native/.github/workflows/pr-visual-recap-reusable.yml@main
#       secrets:
#         PLAN_RECAP_TOKEN: ${{ secrets.PLAN_RECAP_TOKEN }}
#         ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
#
# IMPORTANT: callers must trigger on the same pull_request event types as this
# file declares in its on.workflow_call section (opened, synchronize, reopened,
# ready_for_review).  The workflow_call trigger inherits the CALLER's event
# context, so `github.event.pull_request.*` expressions here work correctly only
# when the caller fires on pull_request.

on:
  workflow_call:
    inputs:
      # Version of @agent-native/core to use when the consumer repo does NOT
      # have a local packages/core/src/cli/index.ts (the normal case for
      # consumer repos).  Defaults to "latest".  Pin to a specific version or
      # tag for reproducibility: e.g. "1.2.3" or "latest".
      cli-version:
        description: "Version of @agent-native/core CLI (npx @agent-native/core@<version>)"
        required: false
        type: string
        default: "latest"
      # Coding-agent backend.  Validated in the gate; mis-cased values are
      # normalized to lowercase.
      agent:
        description: "Coding-agent backend: 'claude' (default) or 'codex'"
        required: false
        type: string
        default: "claude"
      # Optional model override passed to the agent CLI via --model.  Must
      # match [a-zA-Z0-9._-]{1,80}.  Leave empty to use the CLI default.
      model:
        description: "Model name passed to the agent CLI (leave empty for CLI default)"
        required: false
        type: string
        default: ""
      # Reasoning depth for the Codex backend (none|minimal|low|medium|high|xhigh).
      # Ignored for Claude — Claude's reasoning is model-driven.
      reasoning:
        description: "Reasoning depth for Codex: none|minimal|low|medium|high|xhigh"
        required: false
        type: string
        default: ""
      # URL of the Agent-Native Plan app that receives the recap.  Override
      # only when self-hosting.
      plan-url:
        description: "Base URL of the Plan app (default: https://plan.agent-native.com)"
        required: false
        type: string
        default: "https://plan.agent-native.com"
      # Controls which visual-recap guidance the agent prompt is built from.
      # 'auto' / 'latest' uses the bundled guidance in @agent-native/core.
      # 'repo' pins to the committed visual-recap skill in the caller's repo.
      skill-source:
        description: "Skill-source mode: auto (default), latest, or repo"
        required: false
        type: string
        default: "auto"
    secrets:
      # Required: bearer token minted by `agent-native connect`.  Authorizes
      # publishing the recap plan and the screenshot upload.
      PLAN_RECAP_TOKEN:
        required: true
      # Required for the default claude backend; optional when agent=codex.
      ANTHROPIC_API_KEY:
        required: false
      # Required when agent=codex; ignored otherwise.
      OPENAI_API_KEY:
        required: false
      # Override only when self-hosting the Plan app at a non-default origin.
      # Must match the plan-url input origin.
      PLAN_RECAP_APP_URL:
        required: false

# Concurrency key uses the caller's PR number so parallel pushes to the same
# PR cancel the older run.  workflow_call inherits the caller's event context,
# so github.event.pull_request.number resolves correctly here.
concurrency:
  group: pr-visual-recap-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: read
    outputs:
      run: ${{ steps.decide.outputs.run }}
      agent: ${{ steps.decide.outputs.agent }}
    steps:
      - id: decide
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          # Presence-only signals — never expose secret VALUES to the gate.
          HAS_PLAN: ${{ secrets.PLAN_RECAP_TOKEN != '' }}
          HAS_ANTHROPIC: ${{ secrets.ANTHROPIC_API_KEY != '' }}
          HAS_OPENAI: ${{ secrets.OPENAI_API_KEY != '' }}
          AGENT: ${{ inputs.agent }}
          VISUAL_RECAP_MODEL: ${{ inputs.model }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const reasons = [];

            if (!pr) reasons.push('no pull_request payload');
            if (pr && pr.draft) reasons.push('draft PR');

            // Fork PRs run with no secrets, so publishing would fail anyway — skip.
            const headRepo = pr && pr.head && pr.head.repo && pr.head.repo.full_name;
            if (pr && headRepo && headRepo !== process.env.GITHUB_REPOSITORY) {
              reasons.push(`fork PR (${headRepo})`);
            }

            const login = (pr && pr.user && pr.user.login || '').toLowerCase();
            const botAuthors = ['dependabot[bot]', 'dependabot', 'renovate[bot]', 'renovate'];
            if (botAuthors.includes(login)) reasons.push(`bot author (${login})`);
            if (pr && pr.user && pr.user.type === 'Bot') reasons.push('bot author (type=Bot)');

            if (process.env.HAS_PLAN !== 'true') reasons.push('PLAN_RECAP_TOKEN not configured');

            // Normalize + validate the agent.
            const agent = (process.env.AGENT || 'claude').toLowerCase();
            if (agent !== 'claude' && agent !== 'codex') {
              reasons.push(`unsupported agent input "${process.env.AGENT}" (expected "claude" or "codex")`);
            } else if (agent === 'codex') {
              if (process.env.HAS_OPENAI !== 'true') reasons.push('OPENAI_API_KEY not configured (codex backend)');
            } else {
              if (process.env.HAS_ANTHROPIC !== 'true') reasons.push('ANTHROPIC_API_KEY not configured (claude backend)');
            }

            // Validate the model before it reaches the agent CLI.
            const model = process.env.VISUAL_RECAP_MODEL || '';
            if (model && !/^[a-zA-Z0-9._-]{1,80}$/.test(model)) {
              reasons.push(`invalid model input value (must match [a-zA-Z0-9._-]{1,80})`);
            }

            // Self-modifying guard: skip if the PR touches the workflow, skill,
            // or any agent config the runner loads.  Consumer repos never have
            // packages/core as the recap CLI source, so that rule is omitted here.
            if (pr) {
              try {
                const files = await github.paginate(github.rest.pulls.listFiles, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  per_page: 100,
                });
                const isSensitive = (p) =>
                  // The CALLER workflow that references this reusable file.
                  p === '.github/workflows/pr-visual-recap.yml' ||
                  // This reusable file itself.
                  p === '.github/workflows/pr-visual-recap-reusable.yml' ||
                  /(^|\/)skills\/visual-(recap|plan|plans)\//.test(p) ||
                  /(^|\/)\.claude\//.test(p) ||
                  /(^|\/)CLAUDE\.md$/.test(p) ||
                  /(^|\/)AGENTS\.md$/.test(p) ||
                  /(^|\/)\.mcp\.json$/.test(p);
                const hits = files.map((f) => f.filename).filter(isSensitive);
                if (hits.length) {
                  reasons.push(`PR modifies recap-control files (${hits.slice(0, 3).join(', ')}${hits.length > 3 ? ', …' : ''}) — skipping so untrusted PR code never runs with secrets`);
                }
              } catch (e) {
                // Fail CLOSED: if the file list can't be read, skip.
                reasons.push(`could not list PR files for the self-modifying guard (${e.message}); skipping to be safe`);
              }
            }

            const run = reasons.length === 0;
            core.setOutput('run', run ? 'true' : 'false');
            core.setOutput('agent', agent);
            core.info(run ? `Visual recap will run (${agent}).` : `Visual recap skipped: ${reasons.join('; ')}`);

            // When skipping, refresh an EXISTING sticky recap comment with a
            // short skip line so it does not silently go stale. Never create a
            // new comment (no spam for repos where the recap has never run).
            if (!run && pr) {
              try {
                const MARKER = '<!-- pr-visual-recap -->';
                const { data: comments } = await github.rest.issues.listComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  per_page: 100,
                });
                const existing = comments.find(
                  (c) => c.user && c.user.type === 'Bot' && c.body && c.body.includes(MARKER)
                );
                if (existing) {
                  const headShort = (process.env.HEAD_SHA || '').slice(0, 7);
                  const shaRef = headShort ? `\`${headShort}\`` : 'latest push';
                  const primaryReason = reasons.filter(
                    (r) => !r.startsWith('could not list PR files for the self-modifying guard')
                  )[0] || reasons[0] || 'skipped';
                  const skipLine = `_Recap skipped for ${shaRef}: ${primaryReason}._`;
                  const withoutPrev = (existing.body || '')
                    .split('\n')
                    .filter((l) => !/_Recap skipped for .+_$/.test(l.trim()))
                    .join('\n')
                    .trimEnd();
                  const updatedBody = `${withoutPrev}\n\n${skipLine}`;
                  await github.rest.issues.updateComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: existing.id,
                    body: updatedBody,
                  });
                }
              } catch (e) {
                core.warning(`Could not update recap skip comment: ${e.message}`);
              }
            }

  recap:
    name: Generate visual recap
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: write
      checks: write
      contents: read
      issues: write
      pull-requests: write
    env:
      # Use the PLAN_RECAP_APP_URL secret when set (self-hosted); otherwise
      # fall back to the plan-url input.
      PLAN_RECAP_APP_URL: ${{ secrets.PLAN_RECAP_APP_URL || inputs.plan-url }}
      PLAN_RECAP_TOKEN: ${{ secrets.PLAN_RECAP_TOKEN }}
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      VISUAL_RECAP_MODEL: ${{ inputs.model }}
      VISUAL_RECAP_REASONING: ${{ inputs.reasoning }}
      VISUAL_RECAP_SKILL_SOURCE: ${{ inputs.skill-source || 'auto' }}
      RECAP_CLI_VERSION: ${{ inputs.cli-version || 'latest' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      # Consumer repos always use the published CLI (no local packages/core).
      # The cli-version input controls which published version is used.
      - name: Resolve recap CLI
        id: cli
        run: |
          echo "local=false" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install published recap CLI
        run: |
          set -euo pipefail
          VERSION="$RECAP_CLI_VERSION"
          if [ "$VERSION" = "latest" ]; then
            VERSION="$(npm view @agent-native/core@latest version)"
          fi
          for attempt in 1 2 3; do
            if npm install --prefix "$RUNNER_TEMP/recap-cli" --no-audit --no-fund "@agent-native/core@$VERSION"; then
              break
            fi
            if [ "$attempt" = "3" ]; then exit 1; fi
            sleep $((attempt * 10))
          done
          echo "RECAP_CLI=$RUNNER_TEMP/recap-cli/node_modules/.bin/agent-native" >> "$GITHUB_ENV"

      - name: Start visual recap check
        id: recap_check
        continue-on-error: true
        run: |
          set -uo pipefail
          $RECAP_CLI recap check start --sha "$HEAD_SHA" --workflow-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

      - name: Collect bounded diff
        id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          $RECAP_CLI recap collect-diff --base "$BASE_SHA" --head "$HEAD_SHA" --out recap.diff --stat recap.stat

      - name: Probe plan-app auth
        id: auth_probe
        if: steps.diff.outputs.tiny != 'true'
        continue-on-error: true
        run: |
          set -uo pipefail
          # Hit the plan app's action surface with the publish token. A 401 means
          # the token is expired/revoked; surface it in the sticky comment so the
          # repo owner knows to re-mint it instead of seeing a generic failure.
          HTTP_STATUS=$(node -e '
            const https = require("https");
            const url = new URL("/_agent-native/actions/record-recap-usage", process.env.PLAN_RECAP_APP_URL || "https://plan.agent-native.com");
            const req = https.request(url, { method: "POST", headers: { "authorization": "Bearer " + process.env.PLAN_RECAP_TOKEN, "content-type": "application/json" }, timeout: 8000 }, (res) => { process.stdout.write(String(res.statusCode)); req.destroy(); });
            req.on("error", () => process.stdout.write("0"));
            req.end(JSON.stringify({ planId: "__probe__" }));
          ' 2>/dev/null || echo "0")
          if [ "$HTTP_STATUS" = "401" ]; then
            echo "auth_failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "auth_failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Secret scan
        id: scan
        if: steps.diff.outputs.tiny != 'true'
        run: |
          set -uo pipefail
          # Fail CLOSED: a scanner error or invalid JSON suppresses the diff.
          if ! SCAN_JSON="$($RECAP_CLI recap scan --diff recap.diff)"; then
            SCAN_JSON='{"suppressed":true,"reason":"secret scan failed to run; failing closed"}'
          fi
          {
            SCAN_DELIM="$(openssl rand -hex 16)"
            echo "json<<${SCAN_DELIM}"
            echo "$SCAN_JSON"
            echo "${SCAN_DELIM}"
          } >> "$GITHUB_OUTPUT"
          SUPPRESSED=$(node -e 'try{process.stdout.write(JSON.parse(process.argv[1]).suppressed?"true":"false")}catch{process.stdout.write("true")}' "$SCAN_JSON")
          echo "suppressed=$SUPPRESSED" >> "$GITHUB_OUTPUT"

      - name: Read previous plan id
        id: prev
        continue-on-error: true
        run: |
          set -euo pipefail
          PLAN_ID="$($RECAP_CLI recap comment find-plan-id --repo "$GITHUB_REPOSITORY" --issue "$PR_NUMBER" --token "$GH_TOKEN")"
          echo "plan_id=$PLAN_ID" >> "$GITHUB_OUTPUT"

      - name: Build recap prompt
        id: prompt
        if: steps.diff.outputs.tiny != 'true' && steps.scan.outputs.suppressed != 'true'
        env:
          PREV_PLAN_ID: ${{ steps.prev.outputs.plan_id }}
          DIFF_HUGE: ${{ steps.diff.outputs.huge }}
        run: |
          set -euo pipefail
          ARGS=(--diff recap.diff --stat recap.stat --pr "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --head "$HEAD_SHA" --app-url "$PLAN_RECAP_APP_URL" --skill-source "$VISUAL_RECAP_SKILL_SOURCE" --out recap-prompt.md)
          if [ "${DIFF_HUGE:-}" = "true" ]; then ARGS+=(--huge); fi
          if [ -n "${PREV_PLAN_ID:-}" ]; then ARGS+=(--prev-plan-id "$PREV_PLAN_ID"); fi
          $RECAP_CLI recap build-prompt "${ARGS[@]}"

      - name: Run agent (Claude Code)
        id: claude
        if: needs.gate.outputs.agent == 'claude' && steps.diff.outputs.tiny != 'true' && steps.scan.outputs.suppressed != 'true'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -uo pipefail
          MCP_CONFIG="$RUNNER_TEMP/plan-mcp.json"
          $RECAP_CLI recap mcp-config --agent claude --app-url "$PLAN_RECAP_APP_URL" --out "$MCP_CONFIG"
          CLAUDE_ARGS=(-p "$(cat recap-prompt.md)" --mcp-config "$MCP_CONFIG" --allowedTools "Read,Write,Bash(git diff:*),mcp__plan__get-plan-blocks,mcp__plan__create-visual-recap,mcp__plan__set-resource-visibility" --permission-mode dontAsk --output-format json)
          if [ -n "${VISUAL_RECAP_MODEL:-}" ]; then CLAUDE_ARGS+=(--model "$VISUAL_RECAP_MODEL"); fi
          rm -f recap-url.txt claude-result.json claude-stderr.log
          run_claude() {
            set +e
            npx -y @anthropic-ai/claude-code@2 "${CLAUDE_ARGS[@]}" > claude-result.json 2> claude-stderr.log
            CLAUDE_STATUS="$?"
            set -e
            echo "$CLAUDE_STATUS" > claude-exit-code.txt
          }
          run_claude
          if [ ! -s recap-url.txt ] && grep -Eiq 'schedule(d)? a wakeup|connector.*register|mcp.*register' claude-result.json claude-stderr.log 2>/dev/null; then
            echo "Plan MCP registration appears delayed; retrying Claude once after 20s."
            sleep 20
            run_claude
          fi
          rm -f "$MCP_CONFIG" || true

      - name: Run agent (Codex)
        id: codex
        if: needs.gate.outputs.agent == 'codex' && steps.diff.outputs.tiny != 'true' && steps.scan.outputs.suppressed != 'true'
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -uo pipefail
          $RECAP_CLI recap mcp-config --agent codex --app-url "$PLAN_RECAP_APP_URL"
          printenv OPENAI_API_KEY | npx -y @openai/codex@0 login --with-api-key || true
          CODEX_ARGS=(exec --dangerously-bypass-approvals-and-sandbox --skip-git-repo-check)
          if [ -n "${VISUAL_RECAP_MODEL:-}" ]; then CODEX_ARGS+=(--model "$VISUAL_RECAP_MODEL"); fi
          case "${VISUAL_RECAP_REASONING:-}" in
            none|minimal|low|medium|high|xhigh)
              CODEX_ARGS+=(-c "model_reasoning_effort=\"$VISUAL_RECAP_REASONING\"") ;;
            "") ;;
            *) echo "Ignoring invalid VISUAL_RECAP_REASONING: $VISUAL_RECAP_REASONING" ;;
          esac
          rm -f recap-url.txt codex-events.jsonl codex-stderr.log
          run_codex() {
            set +e
            npx -y @openai/codex@0 "${CODEX_ARGS[@]}" --json "$(cat recap-prompt.md)" 2> codex-stderr.log | tee codex-events.jsonl
            CODEX_STATUS="${PIPESTATUS[0]}"
            set -e
            echo "$CODEX_STATUS" > codex-exit-code.txt
          }
          run_codex
          if [ ! -s recap-url.txt ] && grep -Eiq 'schedule(d)? a wakeup|connector.*register|mcp.*register' codex-events.jsonl codex-stderr.log 2>/dev/null; then
            echo "Plan MCP registration appears delayed; retrying Codex once after 20s."
            sleep 20
            run_codex
          fi

      - name: Read plan URL
        id: url
        if: steps.diff.outputs.tiny != 'true' && steps.scan.outputs.suppressed != 'true'
        run: |
          set -uo pipefail
          PLAN_URL=""
          URL_REASON=""
          if [ -f recap-url.txt ]; then
            PLAN_URL="$(tr -d '\r\n' < recap-url.txt | tr -d ' ')"
          else
            URL_REASON="recap-url.txt was not created by the agent"
          fi
          # recap-url.txt is agent-written -> untrusted. Rebuild a canonical
          # recap URL from the trusted app base and a strictly validated plan id.
          if [ -z "$URL_REASON" ]; then
            URL_RESULT=$(PLAN_URL="$PLAN_URL" node <<'NODE'
          const emit = (value) => process.stdout.write(JSON.stringify(value));
          try {
            const raw = process.env.PLAN_URL || "";
            if (!raw) {
              emit({ url: "", reason: "recap-url.txt was empty" });
              process.exit(0);
            }
            const trusted = new URL(process.env.PLAN_RECAP_APP_URL || "https://plan.agent-native.com");
            const parsed = /^https?:\/\//i.test(raw)
              ? new URL(raw)
              : new URL(raw, trusted);
            if (parsed.origin !== trusted.origin) {
              emit({ url: "", reason: `recap-url.txt points at ${parsed.origin}, expected ${trusted.origin}` });
              process.exit(0);
            }

            const base = trusted.pathname.replace(/\/$/, "");
            const paths = [parsed.pathname];
            if (base && parsed.pathname.startsWith(`${base}/`)) {
              paths.push(parsed.pathname.slice(base.length) || "/");
            }

            for (const path of paths) {
              const match = path.match(/^\/(?:plans|recaps)\/([A-Za-z0-9_-]+)\/?$/);
              if (match) {
                emit({ url: `${trusted.origin}${base}/recaps/${match[1]}`, reason: "" });
                process.exit(0);
              }
            }
            emit({ url: "", reason: "recap-url.txt did not contain a valid /plans/<id> or /recaps/<id> URL for the configured plan app" });
          } catch {
            emit({ url: "", reason: "recap-url.txt was not a valid URL or recap path" });
          }
          NODE
            )
            CANONICAL_URL=$(node -e 'try{process.stdout.write(JSON.parse(process.argv[1]).url||"")}catch{process.stdout.write("")}' "$URL_RESULT")
            URL_REASON=$(node -e 'try{process.stdout.write(JSON.parse(process.argv[1]).reason||"")}catch{process.stdout.write("recap-url.txt URL validation failed")}' "$URL_RESULT")
          else
            CANONICAL_URL=""
          fi
          if [ -n "$CANONICAL_URL" ]; then
            echo "plan_url=$CANONICAL_URL" >> "$GITHUB_OUTPUT"; echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "plan_url=" >> "$GITHUB_OUTPUT"; echo "ok=false" >> "$GITHUB_OUTPUT"
          fi
          {
            echo 'reason<<__RECAP_URL_REASON_EOF__'
            echo "$URL_REASON"
            echo '__RECAP_URL_REASON_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Summarize agent failure
        id: agent_summary
        if: steps.url.outputs.ok != 'true' && steps.diff.outputs.tiny != 'true' && steps.scan.outputs.suppressed != 'true'
        continue-on-error: true
        env:
          RECAP_AGENT: ${{ needs.gate.outputs.agent }}
        run: |
          set -uo pipefail
          RESULT=claude-result.json
          STDERR=claude-stderr.log
          EXIT_CODE=claude-exit-code.txt
          if [ "$RECAP_AGENT" = "codex" ]; then
            RESULT=codex-events.jsonl
            STDERR=codex-stderr.log
            EXIT_CODE=codex-exit-code.txt
          fi
          $RECAP_CLI recap agent-summary --agent "$RECAP_AGENT" --result-file "$RESULT" --stderr-file "$STDERR" --exit-code-file "$EXIT_CODE" || true

      - name: Attach usage
        if: steps.url.outputs.ok == 'true'
        continue-on-error: true
        env:
          PLAN_URL: ${{ steps.url.outputs.plan_url }}
          RECAP_AGENT: ${{ needs.gate.outputs.agent }}
        run: |
          set -uo pipefail
          RESULT=claude-result.json
          if [ "$RECAP_AGENT" = "codex" ]; then RESULT=codex-events.jsonl; fi
          if [ -f "$RESULT" ]; then $RECAP_CLI recap usage --plan-url "$PLAN_URL" --agent "$RECAP_AGENT" --result-file "$RESULT" --model "${VISUAL_RECAP_MODEL:-}" --app-url "$PLAN_RECAP_APP_URL" --token "$PLAN_RECAP_TOKEN" || true; fi

      - name: Cache Playwright browsers
        if: steps.url.outputs.ok == 'true'
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-1-${{ runner.os }}

      - name: Screenshot + upload
        id: shot
        if: steps.url.outputs.ok == 'true'
        continue-on-error: true
        env:
          PLAN_URL: ${{ steps.url.outputs.plan_url }}
        run: |
          set -uo pipefail
          npx -y playwright@1 install --with-deps chromium || true
          SHOT_JSON="$($RECAP_CLI recap shot --url "$PLAN_URL" --token "$PLAN_RECAP_TOKEN" --app-url "$PLAN_RECAP_APP_URL" --out recap.png || echo '{}')"
          IMAGE_URL=$(node -e 'try{process.stdout.write(JSON.parse(process.argv[1]).imageUrl||"")}catch{process.stdout.write("")}' "$SHOT_JSON")
          echo "image_url=$IMAGE_URL" >> "$GITHUB_OUTPUT"
          if [ -f recap.png ]; then echo "captured=true" >> "$GITHUB_OUTPUT"; else echo "captured=false" >> "$GITHUB_OUTPUT"; fi

      - name: Upload recap screenshot artifact
        if: steps.shot.outputs.captured == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-visual-recap-${{ github.event.pull_request.number }}
          path: recap.png
          if-no-files-found: ignore
          retention-days: 14

      - name: Upsert sticky comment
        if: always()
        continue-on-error: true
        env:
          PLAN_URL: ${{ steps.url.outputs.plan_url }}
          RECAP_IMAGE_URL: ${{ steps.shot.outputs.image_url }}
          SUPPRESSED: ${{ steps.scan.outputs.suppressed }}
          SUPPRESSED_JSON: ${{ steps.scan.outputs.json }}
          DIFF_HUGE: ${{ steps.diff.outputs.huge }}
          DIFF_TINY: ${{ steps.diff.outputs.tiny }}
          PREV_PLAN_ID: ${{ steps.prev.outputs.plan_id }}
          RECAP_AUTH_FAILED: ${{ steps.auth_probe.outputs.auth_failed }}
          RECAP_AGENT_SUMMARY: ${{ steps.agent_summary.outputs.summary }}
          RECAP_URL_REASON: ${{ steps.url.outputs.reason }}
        run: |
          set -euo pipefail
          ARGS=(recap comment upsert --repo "$GITHUB_REPOSITORY" --issue "$PR_NUMBER" --token "$GH_TOKEN")
          if [ "${DIFF_TINY:-}" = "true" ]; then ARGS+=(--update-only); fi
          $RECAP_CLI "${ARGS[@]}"

      - name: Complete visual recap check
        if: always() && steps.recap_check.outputs.check_run_id != ''
        continue-on-error: true
        env:
          CHECK_RUN_ID: ${{ steps.recap_check.outputs.check_run_id }}
          PLAN_OK: ${{ steps.url.outputs.ok }}
          PLAN_URL: ${{ steps.url.outputs.plan_url }}
          SUPPRESSED: ${{ steps.scan.outputs.suppressed }}
          SUPPRESSED_JSON: ${{ steps.scan.outputs.json }}
          DIFF_HUGE: ${{ steps.diff.outputs.huge }}
          DIFF_TINY: ${{ steps.diff.outputs.tiny }}
          RECAP_AGENT_SUMMARY: ${{ steps.agent_summary.outputs.summary }}
          RECAP_URL_REASON: ${{ steps.url.outputs.reason }}
        run: |
          set -uo pipefail
          $RECAP_CLI recap check complete \
            --check-run-id "$CHECK_RUN_ID" \
            --plan-ok "$PLAN_OK" \
            --plan-url "$PLAN_URL" \
            --suppressed "$SUPPRESSED" \
            --suppressed-json "$SUPPRESSED_JSON" \
            --huge "$DIFF_HUGE" \
            --tiny "$DIFF_TINY" \
            --failure-summary "$RECAP_AGENT_SUMMARY" \
            --url-reason "$RECAP_URL_REASON" \
            --workflow-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
